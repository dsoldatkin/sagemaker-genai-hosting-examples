<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Coder Harness Gateway Architecture</title>
  <desc id="desc">Codex and Claude Code connect to LiteLLM. LiteLLM routes coding-default to a local SageMaker vLLM model first, then falls back to Bedrock GPT and Bedrock Claude Opus.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .panelSoft { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .aws { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.5; rx: 8; }
      .bedrock { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 1.5; rx: 8; }
      .sagemaker { fill: #ecfeff; stroke: #06b6d4; stroke-width: 1.5; rx: 8; }
      .test { fill: #f0fdf4; stroke: #22c55e; stroke-width: 1.5; rx: 8; }
      .title { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #475569; }
      .h2 { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 13px Arial, sans-serif; fill: #1e293b; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .tiny { font: 400 11px Arial, sans-serif; fill: #64748b; }
      .code { font: 600 12px "SFMono-Regular", Consolas, monospace; fill: #0f172a; }
      .line { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .lineSoft { fill: none; stroke: #64748b; stroke-width: 1.6; marker-end: url(#arrow); stroke-dasharray: 6 5; }
      .badge { fill: #e2e8f0; stroke: #cbd5e1; stroke-width: 1; rx: 5; }
      .badgeText { font: 600 11px Arial, sans-serif; fill: #334155; }
      .num { fill: #0f172a; }
      .numText { font: 700 12px Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760"/>

  <text class="title" x="48" y="50">Coder Harness Gateway Architecture</text>
  <text class="subtitle" x="48" y="75">Native harness APIs stay simple; LiteLLM owns model aliases, routing, fallback, and provider translation.</text>

  <rect class="panelSoft" x="40" y="108" width="270" height="230"/>
  <text class="h2" x="64" y="140">Coding Harnesses</text>

  <rect class="panel" x="64" y="166" width="220" height="62"/>
  <text class="label" x="84" y="193">Codex</text>
  <text class="small" x="84" y="214">OpenAI Responses API</text>

  <rect class="panel" x="64" y="252" width="220" height="62"/>
  <text class="label" x="84" y="279">Claude Code</text>
  <text class="small" x="84" y="300">Anthropic Messages API</text>

  <rect class="panelSoft" x="370" y="108" width="280" height="230"/>
  <text class="h2" x="394" y="140">Local Gateway</text>

  <rect class="panel" x="394" y="166" width="232" height="96"/>
  <text class="label" x="414" y="193">LiteLLM Proxy</text>
  <text class="small" x="414" y="214">Port 4000</text>
  <text class="small" x="414" y="235">Auth, routing, fallbacks</text>

  <rect class="badge" x="394" y="280" width="232" height="34"/>
  <text class="badgeText" x="414" y="301">coding-default -> local, GPT, Opus</text>

  <rect class="aws" x="710" y="108" width="500" height="492"/>
  <text class="h2" x="734" y="140">AWS Backends</text>
  <text class="small" x="858" y="140">Region: us-east-2</text>

  <rect class="sagemaker" x="734" y="166" width="430" height="154"/>
  <text class="label" x="758" y="194">SageMaker Real-Time Endpoint</text>
  <text class="code" x="758" y="218">coder-vllm-61ed21e8</text>
  <text class="small" x="758" y="243">Instance: ml.g5.12xlarge</text>
  <text class="small" x="758" y="266">Model: Qwen2.5-Coder-32B-Instruct-AWQ</text>
  <text class="small" x="758" y="289">Runtime: DJL/LMI container with vLLM</text>

  <rect class="panel" x="734" y="350" width="430" height="70"/>
  <text class="label" x="758" y="379">SageMaker OpenAI Adapter</text>
  <text class="small" x="758" y="400">Port 8088, exposes /v1/chat/completions and /v1/responses</text>

  <rect class="bedrock" x="734" y="450" width="430" height="126"/>
  <text class="label" x="758" y="479">Amazon Bedrock Routes</text>
  <text class="code" x="758" y="503">coding-gpt: openai.gpt-oss-120b-1:0</text>
  <text class="code" x="758" y="527">coding-opus: us.anthropic.claude-opus-4-5-20251101-v1:0</text>
  <text class="small" x="758" y="552">Opus uses a Bedrock inference profile, not direct on-demand ID.</text>

  <rect class="panelSoft" x="40" y="394" width="610" height="206"/>
  <text class="h2" x="64" y="426">Gateway Model Aliases</text>

  <rect class="panel" x="64" y="452" width="178" height="54"/>
  <text class="code" x="84" y="476">coding-local</text>
  <text class="tiny" x="84" y="494">SageMaker vLLM</text>

  <rect class="panel" x="258" y="452" width="178" height="54"/>
  <text class="code" x="278" y="476">coding-gpt</text>
  <text class="tiny" x="278" y="494">Bedrock OpenAI</text>

  <rect class="panel" x="452" y="452" width="174" height="54"/>
  <text class="code" x="472" y="476">coding-opus</text>
  <text class="tiny" x="472" y="494">Bedrock Claude Opus</text>

  <rect class="panel" x="64" y="526" width="562" height="50"/>
  <text class="code" x="84" y="548">coding-default</text>
  <text class="small" x="218" y="548">local first, fallback to GPT, then Opus</text>

  <rect class="test" x="40" y="638" width="1170" height="72"/>
  <text class="h2" x="64" y="670">Reproducible Tests</text>
  <text class="code" x="64" y="694">RUN_BEDROCK_TESTS=1 ./tests/test_litellm_gateway.py</text>
  <text class="code" x="454" y="694">./tests/test_codex_litellm.sh</text>
  <text class="code" x="736" y="694">./tests/test_claude_code_litellm.sh</text>

  <path class="line" d="M284 197 C320 197 340 197 394 197"/>
  <path class="line" d="M284 283 C320 283 340 238 394 228"/>
  <path class="line" d="M626 214 C674 214 692 385 734 385"/>
  <path class="line" d="M949 350 L949 320"/>
  <path class="lineSoft" d="M626 214 C690 214 690 514 734 514"/>
  <path class="lineSoft" d="M153 526 C250 382 396 333 510 314"/>
  <path class="lineSoft" d="M347 526 C423 378 490 325 510 314"/>
  <path class="lineSoft" d="M539 526 C545 398 532 342 510 314"/>

  <circle class="num" cx="332" cy="197" r="13"/>
  <text class="numText" x="332" y="197">1</text>
  <circle class="num" cx="668" cy="214" r="13"/>
  <text class="numText" x="668" y="214">2</text>
  <circle class="num" cx="949" cy="335" r="13"/>
  <text class="numText" x="949" y="335">3</text>
  <circle class="num" cx="690" cy="514" r="13"/>
  <text class="numText" x="690" y="514">4</text>

  <text class="tiny" x="316" y="176">native API calls</text>
  <text class="tiny" x="644" y="193">default route</text>
  <text class="tiny" x="968" y="338">invoke endpoint</text>
  <text class="tiny" x="642" y="494">fallback routes</text>
</svg>
